[platformio]
default_envs = esp32_relay

[env:esp32_relay]
platform = espressif32 @ ^6.9.0
board = esp32dev
framework = arduino

upload_speed = 460800
monitor_speed = 115200

; OTA
;upload_protocol = espota
;upload_port = 192.168.0.236

; OTA Partitionstabelle (2 App-Slots)
board_build.partitions = min_spiffs.csv

; Libs
lib_deps =
  SignalK/SensESP @ 3.1.1

build_flags =
  -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
  -D SENSESP_ENABLE_OTA

build_unflags =
  -Werror=reorder

monitor_filters = esp32_exception_decoder
